    <!--
      Language detection: runs synchronously before any render to prevent flickering.
      Priority: 1) localStorage  2) browser language  3) default (ar)
    -->
    <script>
      (function () {
        var STORAGE_KEY = 'ph_ui_lang';
        var stored = localStorage.getItem(STORAGE_KEY);
        var lang;

        if (stored === 'it' || stored === 'ar' || stored === 'en') {
          lang = stored;
        } else {
          var langs = (navigator.languages && navigator.languages.length)
            ? Array.from(navigator.languages)
            : [navigator.language];
          for (var i = 0; i < langs.length; i++) {
            if (!langs[i]) continue;
            var prefix = langs[i].split('-')[0].toLowerCase();
            if (prefix === 'it') { lang = 'it'; break; }
            if (prefix === 'ar') { lang = 'ar'; break; }
            if (prefix === 'en') { lang = 'en'; break; }
          }
          if (!lang) lang = 'ar';
        }

        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      })();
    </script>
